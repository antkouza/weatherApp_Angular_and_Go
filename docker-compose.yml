services:
  backend:
    build: ./backend # Path to Go files
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    restart: always

  frontend:
    build: ./frontend # Path to Angular files
    ports:
      - "4200:80" # Map local 4200 to container's Nginx port 80
    depends_on:
      - backend
